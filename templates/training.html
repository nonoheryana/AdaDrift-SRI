<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdaDrift-SRI | Training Progress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <meta http-equiv="refresh" content="3">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow">
                    <div class="card-body text-center p-5">
                        <div id="trainingStatus">
                            <div class="spinner-border text-primary mb-3" role="status"
                                style="width: 4rem; height: 4rem;">
                                <span class="visually-hidden">Training...</span>
                            </div>
                            <h3>Training in Progress</h3>
                            <p class="text-muted" id="statusMessage">Initializing...</p>

                            <div class="progress mb-3" style="height: 25px;">
                                <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                                    id="progressBar" role="progressbar" style="width: 0%">
                                    0%
                                </div>
                            </div>

                            <p class="small text-muted">This may take a few minutes depending on dataset size.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkProgress() {
            fetch('/api/progress')
                .then(response => response.json())
                .then(data => {
                    const progressBar = document.getElementById('progressBar');
                    const statusMessage = document.getElementById('statusMessage');

                    progressBar.style.width = data.progress + '%';
                    progressBar.textContent = data.progress + '%';
                    statusMessage.textContent = data.message;

                    if (data.status === 'completed') {
                        window.location.href = '/results';
                    } else if (data.status === 'error') {
                        document.getElementById('trainingStatus').innerHTML = `
                            <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
                            <h3>Training Error</h3>
                            <p class="text-danger">${data.error}</p>
                            <a href="/upload" class="btn btn-primary">Try Again</a>
                        `;
                    } else {
                        setTimeout(checkProgress, 2000);
                    }
                });
        }

        checkProgress();
    </script>
</body>

</html>
